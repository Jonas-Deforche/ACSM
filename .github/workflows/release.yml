name: Release stack

on:
  push:
    branches: ["main"]

jobs:
  release:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Build stack zip
        run: |
          zip -r acsm-stack.zip \
            docker-compose.yml \
            infra/ \
            my-config/

      - name: Update latest release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Maak release aan als die nog niet bestaat
          gh release create latest --title "Latest stack" --notes "ACSM stack + binaries" 2>/dev/null || true
          # Upload/overschrijf enkel de stack zip, raak binaries niet aan
          gh release upload latest acsm-stack.zip --clobber --repo ${{ github.repository }}
